<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>404 · Yakka Works</title>

    <meta name="description" content="The page you're looking for couldn't be found.">

    <link rel="icon" href="assets/img/favicon.ico">

    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo {
            width: 96px;
            height: 96px;
        }

    <main class="container">

        <img
            src="assets/img/logo.svg"

        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center mt-4">

            <a href="/" class="btn btn-primary">

            </a>

            <a href="https://github.com/yakkaworks/yakkaworks/issues" class="btn btn-outline-secondary">
                <i class="bi bi-bug me-2"></i>

            </a>

        </div>

        <hr class="my-5">

        <small class="text-body-secondary">
            Yakka Works · TheoTown plugins, documentation, tools and resources.
