site_name: Yakka Works
site_description: TheoTown plugins, documentation, tools and resources.
site_author: Yakka
site_url: https://yakkaworks.github.io/

repo_name: yakkaworks/yakkaworks
repo_url: https://github.com/yakkaworks/yakkaworks
edit_uri: edit/main/docs/

copyright: >
  Copyright © 2025 Yakka Works.
  TheoTown is a trademark of blueflower.
  This website is an independent community project.

theme:
  name: material
  custom_dir: overrides

  logo: assets/img/logo.svg
  favicon: assets/img/favicon.ico

  language: en

  palette:
    - scheme: default
      primary: blue
      accent: indigo

  font: false

  features:
    # Navigation
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.top

    # Table of contents
    - toc.follow

    # Search
    - search.highlight
    - search.share
    - search.suggest

    # Content
    - content.code.copy
    - content.code.annotate
    - content.tooltips

markdown_extensions:

  - admonition

  - attr_list

  - md_in_html

  - tables

  - footnotes

  - def_list

  - abbr

  - pymdownx.details

  - pymdownx.superfences

  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite

  - pymdownx.snippets

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.tasklist:
      custom_checkbox: true

plugins:

  - search

extra_css:
  - assets/css/style.css
  - assets/css/mkdocs.css

extra_javascript:
  - assets/js/app.js

extra:

  social:

    - icon: fontawesome/brands/github
      link: https://github.com/yakkaworks

    - icon: fontawesome/brands/discord
      link: https://discord.gg/

    - icon: fontawesome/brands/facebook
      link: https://facebook.com/

nav:

  - Home: index.md

  - Store:
      - store/index.md

  - Library:
      - library/index.md

  - Blog:
      - blog/index.md
